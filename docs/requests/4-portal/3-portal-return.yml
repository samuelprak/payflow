info:
  name: 3. Portal Return Redirect
  type: http
  seq: 3

http:
  method: GET
  url: "{{backendUrl}}/portal/{{portalSessionId}}/return"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: false
  maxRedirects: 0

docs: |
  Hits the portal return redirect endpoint.

  Expects a 302 redirect to the `returnUrl` configured when creating the
  portal session (https://example.com/return).
