info:
  name: 2. Redirect to Portal
  type: http
  seq: 2

http:
  method: GET
  url: "{{backendUrl}}/portal/{{portalSessionId}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: false
  maxRedirects: 0

docs: |
  Hits the portal redirect endpoint.

  Expects a 302 redirect to the Stripe-hosted customer portal.
  `followRedirects` is disabled so you can inspect the Location header.
