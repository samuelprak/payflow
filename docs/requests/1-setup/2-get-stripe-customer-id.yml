info:
  name: 2. Get Stripe Customer ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{stripeBaseUrl}}/customers/search?query=email:'customer_1@example.com'"
  headers:
    - name: Authorization
      value: Bearer {{stripeSecretKey}}
  params:
    - name: query
      value: email:'customer_1@example.com'
      type: query

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.data[0].id
        method: jsonq
      variable:
        name: stripeCustomerId
        scope: runtime

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Searches Stripe for the customer created by the sync endpoint.
  Saves `stripeCustomerId` (the `cus_` ID) for use in subscription creation.

  Note: `encodeUrl` is false so the query param doesn't get double-encoded.
