info:
  name: 3. Checkout Success Redirect
  type: http
  seq: 3

http:
  method: GET
  url: "{{backendUrl}}/checkout/{{checkoutSessionId}}/success"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: false
  maxRedirects: 0

docs: |
  Hits the checkout success redirect endpoint.

  Expects a 302 redirect to the `successUrl` configured when creating the
  checkout session (https://example.com/success).
