info:
  name: 2. Redirect to Checkout
  type: http
  seq: 2

http:
  method: GET
  url: "{{backendUrl}}/checkout/{{checkoutSessionId}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: false
  maxRedirects: 0

docs: |
  Hits the checkout redirect endpoint.

  Expects a 302 redirect to the Stripe-hosted checkout page.
  `followRedirects` is disabled so you can inspect the Location header.
