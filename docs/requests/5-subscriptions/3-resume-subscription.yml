info:
  name: 3. Resume Subscription
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{backendUrl}}/subscriptions"
  headers:
    - name: Content-Type
      value: application/json
    - name: x-api-key
      value: "{{tenantApiKey}}"
  body:
    type: json
    data: |-
      {
        "userRef": "{{userRef}}",
        "cancelAtPeriodEnd": false
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Resumes a subscription that was previously set to cancel at period end.

  **Requires:** A subscription with `cancelAtPeriodEnd: true` from the
  previous request.

  Expects `{ "success": true }`.
