info:
  name: 3. Verify Subscription Cancelled
  type: http
  seq: 3

http:
  method: GET
  url: "{{stripeBaseUrl}}/subscriptions/{{subscriptionId}}"
  headers:
    - name: Authorization
      value: Bearer {{stripeSecretKey}}

runtime:
  scripts:
    - type: tests
      code: |-
        test("subscription should be canceled", function() {
          expect(res.body.status).to.equal("canceled");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Verifies the subscription was cancelled immediately after
  the early fraud warning was processed.
